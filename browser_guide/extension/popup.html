<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: sans-serif;
      cursor: pointer;
    }

    h1 {
      font-size: 16px;
      margin-bottom: 5px;

    .status {

<body>

    <span id="indicator"></span> <span id="text">Disconnected</span>
  </div>
